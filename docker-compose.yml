# =============================================================================
# Local development stack: API + Worker + Postgres + Redis.
# Run: docker compose up --build
# Stop: docker compose down -v   (the -v wipes the DB volume for a clean slate)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: tx-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (host 5432 is taken)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transactions"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tx-redis
    ports:
      - "6380:6379"   # host 6380 -> container 6379 (host 6379 is taken)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tx-api
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/transactions
      REDIS_URL: redis://redis:6379/0
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LLM_MODEL: gemini-2.5-flash
      LLM_BATCH_SIZE: "20"
      RQ_QUEUE_NAME: default
      UPLOAD_DIR: /tmp/uploads
      MAX_UPLOAD_BYTES: "10485760"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tx-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tx-worker
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/transactions
      REDIS_URL: redis://redis:6379/0
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      LLM_MODEL: gemini-2.5-flash
      LLM_BATCH_SIZE: "20"
      RQ_QUEUE_NAME: default
      UPLOAD_DIR: /tmp/uploads
    volumes:
      - uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "default"]
    restart: unless-stopped

volumes:
  pgdata:
    name: tx-pgdata
  uploads:
    name: tx-uploads
