name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Used by tests inside the runner. Service containers are reachable
  # via their service name on localhost in the actions runner.
  DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/transactions
  REDIS_URL: redis://localhost:6379/0
  APP_ENV: test
  LOG_LEVEL: WARNING

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: transactions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d transactions"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check app/ tests/ scripts/

      - name: Format check (ruff format)
        run: ruff format --check app/ tests/ scripts/

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false          # we don't push in CI to keep the job fast and free
          tags: backend-devops-assignment-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
